<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003527"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#735c00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e9c349" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <rect width="400" height="300" fill="url(#glow)"/>
  <!-- House icon -->
  <g transform="translate(200,150)" fill="#ffffff" opacity="0.6">
    <polygon points="0,-50 -60,0 60,0" />
    <rect x="-45" y="0" width="90" height="55" rx="2"/>
    <rect x="-20" y="15" width="40" height="40" rx="2"/>
    <rect x="-50" y="5" width="10" height="50" rx="1"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#0b513d" opacity="0.5"/>
</svg>
