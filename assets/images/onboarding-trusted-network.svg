<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#735c00"/>
      <stop offset="100%" stop-color="#574500"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <!-- Handshake -->
  <g transform="translate(200,180)" fill="#ffffff" opacity="0.85">
    <!-- Left hand -->
    <path d="M-80,-20 C-60,-40 -20,-40 0,-20 C20,-40 60,-40 80,-20 C95,-5 95,10 80,20 C60,40 20,40 0,20 C-20,40 -60,40 -80,20 C-95,10 -95,-5 -80,-20Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M-30,-40 L-80,-20 L-30,-10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M30,-40 L80,-20 L30,-10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Verified badge -->
  <g transform="translate(200,300)" fill="#ffffff" opacity="0.5">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#e9c349" stroke-width="2"/>
    <path d="M-8,0 L-3,6 L8,-6" fill="none" stroke="#e9c349" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Person silhouettes -->
  <circle cx="130" cy="80" r="15" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="130" cy="115" rx="20" ry="12" fill="#ffffff" opacity="0.3"/>
  <circle cx="270" cy="80" r="15" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="270" cy="115" rx="20" ry="12" fill="#ffffff" opacity="0.3"/>
</svg>
