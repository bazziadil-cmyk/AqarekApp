<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003527"/>
      <stop offset="100%" stop-color="#0b513d"/>
    </linearGradient>
    <linearGradient id="grt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#735c00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <!-- Stars -->
  <circle cx="50" cy="50" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="350" cy="80" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="80" cy="350" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="320" cy="320" r="2" fill="#ffffff" opacity="0.5"/>
  <!-- Smart Match Ring -->
  <g transform="translate(200,200)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#grt)" stroke-width="8" stroke-dasharray="502" stroke-dashoffset="100" stroke-linecap="round" transform="rotate(-90)"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ffffff" font-size="40" font-family="Noto Serif" font-weight="700">98%</text>
    <text x="0" y="20" text-anchor="middle" fill="#e9c349" font-size="14" font-family="IBM Plex Sans" font-weight="600">تطابق</text>
  </g>
  <!-- House icon below -->
  <g transform="translate(200,340)" fill="#ffffff" opacity="0.4">
    <polygon points="0,-25 -30,0 30,0"/>
    <rect x="-22" y="0" width="44" height="30" rx="2"/>
    <rect x="-10" y="8" width="20" height="22" rx="1"/>
  </g>
</svg>
