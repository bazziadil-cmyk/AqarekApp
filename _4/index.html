<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #f8f9ff;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        .luxury-card {
            box-shadow: 0px 10px 30px rgba(6, 78, 59, 0.05);
        }
        .form-input:focus ~ label,
        .form-input:not(:placeholder-shown) ~ label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #003527;
        }
        .custom-checkbox:checked {
            background-color: #003527;
            border-color: #003527;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex flex-col items-center justify-center">
<!-- Top AppBar (Simulated Context) -->
<header class="w-full top-0 sticky bg-surface flex flex-row-reverse justify-between items-center px-container-margin py-stack-sm shadow-[0px_10px_30px_rgba(6,78,59,0.05)] z-50">
<div class="flex items-center gap-4">
<span class="font-display-lg text-primary tracking-tight">Aqarak</span>
</div>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_forward</span>
</button>
</header>
<main class="w-full max-w-xl px-container-margin py-stack-lg flex-grow flex flex-col justify-center">
<!-- Logo/Icon Section -->
<div class="flex flex-col items-center mb-stack-lg space-y-4">
<div class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center shadow-lg relative">
<div class="absolute inset-0 rounded-full border-2 border-secondary opacity-30 animate-ping"></div>
<span class="material-symbols-outlined text-secondary-fixed text-4xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<h1 class="font-display-lg text-headline-lg-mobile md:text-headline-lg text-primary text-center">
                انضم لنخبة الوسطاء
            </h1>
<p class="font-body-lg text-on-surface-variant text-center max-w-sm">
                ابدأ رحلتك المهنية مع المنصة العقارية الأكثر تطوراً في الخليج.
            </p>
</div>
<!-- Registration Form -->
<div class="bg-white p-8 rounded-xl luxury-card border border-outline-variant/30">
<form class="space-y-6" onsubmit="window.location.href='../_6/'; return false;">
<!-- Full Name -->
<div class="relative">
<input class="form-input block w-full px-4 py-4 text-on-surface bg-transparent border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-all peer" id="full_name" name="full_name" placeholder=" " required="" type="text"/>
<label class="absolute right-4 top-4 text-on-surface-variant font-label-caps text-label-caps pointer-events-none transition-all duration-200 origin-right" for="full_name">
                        الاسم الكامل
                    </label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- License Number -->
<div class="relative">
<input class="form-input block w-full px-4 py-4 text-on-surface bg-transparent border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-all peer" id="license" name="license" placeholder=" " required="" type="text"/>
<label class="absolute right-4 top-4 text-on-surface-variant font-label-caps text-label-caps pointer-events-none transition-all duration-200 origin-right" for="license">
                            رقم الترخيص العقاري
                        </label>
</div>
<!-- Brokerage Name (Optional) -->
<div class="relative">
<input class="form-input block w-full px-4 py-4 text-on-surface bg-transparent border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-all peer" id="brokerage" name="brokerage" placeholder=" " type="text"/>
<label class="absolute right-4 top-4 text-on-surface-variant font-label-caps text-label-caps pointer-events-none transition-all duration-200 origin-right" for="brokerage">
                            اسم الشركة (اختياري)
                        </label>
</div>
</div>
<!-- Phone -->
<div class="relative">
<div class="flex items-center border-b-2 border-outline-variant focus-within:border-primary transition-all">
<span class="pl-4 font-body-lg text-on-surface-variant" dir="ltr">+966</span>
<input class="form-input block w-full py-4 text-on-surface bg-transparent border-none focus:ring-0 transition-all peer" id="phone" name="phone" placeholder=" " required="" type="tel"/>
</div>
<label class="absolute right-16 top-4 text-on-surface-variant font-label-caps text-label-caps pointer-events-none transition-all duration-200 origin-right" for="phone">
                        رقم الجوال
                    </label>
</div>
<!-- Password -->
<div class="relative">
<input class="form-input block w-full px-4 py-4 text-on-surface bg-transparent border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-all peer" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute right-4 top-4 text-on-surface-variant font-label-caps text-label-caps pointer-events-none transition-all duration-200 origin-right" for="password">
                        كلمة المرور
                    </label>
<button class="absolute left-2 top-4 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 py-2">
<input class="custom-checkbox w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant cursor-pointer" for="terms">
                        أوافق على <a class="text-primary font-bold hover:underline" href="#">شروط الخدمة</a> و <a class="text-primary font-bold hover:underline" href="#">سياسة الخصوصية</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary text-secondary-fixed font-title-md text-title-md rounded-xl shadow-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    إنشاء حساب
                    <span class="material-symbols-outlined text-xl">person_add</span>
</button>
<!-- Alternative Link -->
<div class="text-center pt-4">
<p class="font-body-lg text-on-surface-variant">
                        لديك حساب؟ 
                        <a class="text-primary font-bold hover:text-secondary transition-colors" href="../_4/">تسجيل دخول</a>
</p>
</div>
</form>
</div>
<!-- Decorative Element -->
<div class="mt-stack-lg flex justify-center items-center gap-6 opacity-40 grayscale pointer-events-none">
<img alt="Real Estate Icon" class="w-8 h-8" src="../assets/images/icon-real-estate.svg"/>
<div class="h-px w-12 bg-outline-variant"></div>
<img alt="Partnership Icon" class="w-8 h-8" src="../assets/images/icon-partnership.svg"/>
<div class="h-px w-12 bg-outline-variant"></div>
<img alt="Premium Icon" class="w-8 h-8" src="../assets/images/icon-premium.svg"/>
</div>
</main>
<footer class="w-full py-6 text-center">
<p class="font-label-caps text-label-caps text-outline uppercase tracking-widest">
            © 2024 AQARAK LUXURY REAL ESTATE NETWORK
        </p>
</footer>
<!-- Atmosphere Background Layer -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary-fixed/10 blur-[120px] rounded-full"></div>
</div>
<script>
        // Simple Interaction logic
        const togglePassword = document.querySelector('button span.material-symbols-outlined');
        const passwordInput = document.getElementById('password');
        
        if(togglePassword) {
            togglePassword.parentElement.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            });
        }

        // Form Focus Effects
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
